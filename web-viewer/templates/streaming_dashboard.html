<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        
        .header h1 {
            color: #667eea;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .stats {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .stat-card {
            background: rgba(102, 126, 234, 0.1);
            padding: 15px 25px;
            border-radius: 10px;
            border: 2px solid rgba(102, 126, 234, 0.3);
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            color: #666;
            font-size: 0.9rem;
            margin-top: 5px;
        }
        
        .streams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }
        
        .stream-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .stream-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }
        
        .stream-preview {
            aspect-ratio: 16/9;
            background: linear-gradient(45deg, #667eea, #764ba2);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .stream-preview.live {
            background: #000;
        }
        
        .stream-preview video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .preview-placeholder {
            color: white;
            font-size: 3rem;
            opacity: 0.3;
        }
        
        .stream-info {
            padding: 20px;
        }
        
        .stream-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }
        
        .stream-meta {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #666;
            font-size: 0.9rem;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .status-badge.streaming {
            background: #10b981;
            color: white;
        }
        
        .status-badge.initialized {
            background: #f59e0b;
            color: white;
        }
        
        .status-badge.stopped {
            background: #ef4444;
            color: white;
        }
        
        .status-badge.ended {
            background: #6b7280;
            color: white;
        }

        
        .stream-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5a67d8;
        }
        
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        
        .btn-danger:hover {
            background: #dc2626;
        }
        
        .empty-state {
            background: white;
            border-radius: 15px;
            padding: 60px 30px;
            text-align: center;
            margin-top: 30px;
        }
        
        .empty-state h2 {
            color: #999;
            margin-bottom: 20px;
        }
        
        .control-panel {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }
        
        .control-panel h2 {
            margin-bottom: 20px;
            color: #333;
        }
        
        .control-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .viewer-count {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #ef4444;
            font-weight: bold;
        }
        
        .live-indicator {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ef4444;
            color: white;
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 0.85rem;
            font-weight: bold;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🎥 Live Stream Dashboard</h1>
            <p>Monitor and manage all active live streams</p>
            
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="totalStreams">0</div>
                    <div class="stat-label">Total Streams</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalViewers">0</div>
                    <div class="stat-label">Total Viewers</div>
                </div>

            </div>
        </div>
        
        <!-- Control Panel -->
        <div class="control-panel">
            <h2>Controls</h2>
            <div class="control-buttons">
                <button class="btn btn-primary" onclick="refreshStreams()">
                    Refresh Streams
                </button>
                <button class="btn btn-danger" onclick="cleanupOldStreams()">
                    Clean Up Old Recordings
                </button>
            </div>
        </div>

        
        <!-- Streams Grid -->
        <div class="streams-grid" id="streamsGrid">
            <!-- Stream cards will be inserted here -->
        </div>
        
        <div class="empty-state" id="emptyState" style="display: none;">
            <h2>No Active Streams</h2>
            <p>Start broadcasting from the Screen Capture Client to see a stream here.</p>
        </div>

    </div>
    
    <script>
        // Base URL of the Broadcasting Engine (Part 2), injected by the Flask
        // viewer app. All API/HLS requests go cross-origin to the engine.
        const ENGINE = "{{ engine_url }}";

        let streams = [];
        let players = {};
        
        // Load streams on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadStreams();
            
            // Refresh every 3 seconds
            setInterval(loadStreams, 3000);
        });
        
        // Stats are derived directly from the stream list.
        function loadStats() {
            let viewers = 0;
            streams.forEach(s => { viewers += (s.viewers || 0); });
            document.getElementById('totalStreams').textContent = streams.length;
            document.getElementById('totalViewers').textContent = viewers;
        }

        
        async function loadStreams() {
            try {
                const response = await fetch(`${ENGINE}/api/screen-stream/list`);
                streams = await response.json();
                renderStreams();
                loadStats();
            } catch (error) {
                console.error('Error loading streams:', error);
            }
        }

        
        function renderStreams() {
            const grid = document.getElementById('streamsGrid');
            const emptyState = document.getElementById('emptyState');
            
            if (streams.length === 0) {
                grid.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }
            
            emptyState.style.display = 'none';
            
            grid.innerHTML = streams.map(stream => `
                <div class="stream-card">
                    <div class="stream-preview ${stream.status === 'streaming' ? 'live' : ''}">
                        ${stream.status === 'streaming' ? '<div class="live-indicator">LIVE</div>' : ''}
                        <video id="player-${stream.id}" class="video-player" style="display: none;"></video>
                        <div class="preview-placeholder" id="placeholder-${stream.id}">📹</div>
                    </div>
                    <div class="stream-info">
                        <div class="stream-name">${stream.name}</div>
                        <div class="stream-meta">
                            <span class="status-badge ${stream.status}">${stream.status.toUpperCase()}</span>
                            <div class="meta-item">
                                <span>${stream.width}x${stream.height}</span>
                            </div>
                            <div class="meta-item">
                                <span>${stream.fps} fps</span>
                            </div>
                            ${stream.type === 'external' ? 
                                `<div class="meta-item">
                                    <span>External (${stream.source_ip})</span>
                                </div>` : ''
                            }
                        </div>
                        ${stream.viewers !== undefined ? 
                            `<div class="viewer-count">
                                👁 ${stream.viewers} viewers
                            </div>` : ''
                        }
                        <div class="stream-actions">
                            ${stream.status === 'streaming' ? 
                                `<a href="/viewer/${stream.id}" target="_blank" class="btn btn-primary">
                                    Watch Stream
                                </a>` :
                              (stream.status === 'ended' ?

                                `<a href="/viewer/${stream.id}" target="_blank" class="btn btn-primary">
                                    ▶ Replay
                                </a>
                                <button class="btn btn-danger" onclick="deleteStream('${stream.id}')">
                                    Delete
                                </button>` :
                                `<button class="btn btn-primary" disabled>
                                    Not Streaming
                                </button>`)
                            }
                        </div>

                    </div>
                </div>
            `).join('');
            
            // Initialize HLS players for streaming videos
            streams.forEach(stream => {
                if (stream.status === 'streaming') {
                    initializePlayer(stream.id);
                }
            });
        }
        
        function initializePlayer(streamId) {
            const video = document.getElementById(`player-${streamId}`);
            const placeholder = document.getElementById(`placeholder-${streamId}`);
            
            if (!video || players[streamId]) return;
            
            if (Hls.isSupported()) {
                const hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                });
                
                hls.loadSource(`${ENGINE}/api/screen-stream/${streamId}/stream.m3u8`);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.style.display = 'block';
                    placeholder.style.display = 'none';
                    video.muted = true;
                    video.play().catch(e => console.log('Autoplay prevented'));
                });
                
                players[streamId] = hls;
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = `${ENGINE}/api/screen-stream/${streamId}/stream.m3u8`;
                video.addEventListener('loadedmetadata', () => {
                    video.style.display = 'block';
                    placeholder.style.display = 'none';
                    video.muted = true;
                    video.play().catch(e => console.log('Autoplay prevented'));
                });
            }
        }
        
        async function deleteStream(streamId) {

            if (!confirm('Delete this recording permanently?')) return;
            try {
                const response = await fetch(`${ENGINE}/api/screen-stream/${streamId}/delete`, { method: 'POST' });
                if (response.ok) {
                    loadStreams();
                } else {
                    alert('Failed to delete recording');
                }
            } catch (error) {
                console.error('Error deleting recording:', error);
            }
        }
        
        async function cleanupOldStreams() {
            if (!confirm('Delete all ended recordings?')) return;

            
            try {
                const response = await fetch(`${ENGINE}/api/cleanup`, {
                    method: 'POST'
                });
                
                if (response.ok) {
                    const result = await response.json();
                    alert(result.message);
                    loadStreams();
                }
            } catch (error) {
                console.error('Error cleaning up streams:', error);
            }
        }
        
        function refreshStreams() {
            loadStreams();
            loadStats();
        }
    </script>
</body>
</html>
